<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>MeteoLocal — Widget</title>
<link rel="manifest" href="manifest-widget.json">
<meta name="theme-color" content="#091826">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0;overflow:hidden}
body{background:linear-gradient(165deg,#050a12 0%,#091826 100%);color:#fff;
  font-family:'Segoe UI',system-ui,sans-serif;}

/* Card ocupa tot spatiul deasupra ctrl-bar, padding-bottom lasa loc barei */
#card{
  display:flex;flex-direction:column;justify-content:space-evenly;
  position:fixed;top:0;left:0;right:0;bottom:0;
  padding:clamp(12px,3.5vw,24px) clamp(12px,3.5vw,24px) 185px;
  cursor:pointer;border:1px solid rgba(255,255,255,.08);
  text-decoration:none;color:inherit;overflow-y:auto;overflow-x:hidden;
}
#card:active{background:rgba(255,255,255,.03)}
#card.flashing{animation:refreshFlash 1.4s ease-out forwards}

.row1{display:flex;align-items:center;gap:clamp(10px,3vw,18px);min-width:0;flex-shrink:0}
.ico{font-size:clamp(2.6rem,13vw,4.5rem);line-height:1;flex:0 0 auto}
.tblock{display:flex;flex-direction:column;min-width:0;flex:1;gap:2px}
.temp{font-size:clamp(2.8rem,14vw,5rem);font-weight:800;line-height:1.0;white-space:nowrap}
.temp .unit{font-size:.5em;font-weight:600;color:#9fb3c8}
.sub{font-size:clamp(.9rem,3.8vw,1.25rem);color:#cdd9e6;line-height:1.3;font-weight:600}
.loc{font-size:clamp(.78rem,3vw,.95rem);color:#e0eefa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:700}

.lines{display:flex;flex-direction:column;gap:clamp(4px,1vh,8px);min-width:0;flex-shrink:0}
.line{font-size:clamp(.84rem,3.5vw,1.1rem);color:#cdd9e6;line-height:1.3;
  display:flex;align-items:center;gap:5px;flex-wrap:wrap;font-weight:600}
.line b{color:#fff;font-weight:800}
.line.hi{color:#fbbf24}
.line.rainevt{color:#7dd3fc;font-weight:700;background:rgba(56,189,248,.1);
  border:1px solid rgba(125,211,252,.25);border-radius:7px;padding:4px 8px}
.line.heat{color:#fb7185;font-weight:700}
.line.frost{color:#7dd3fc;font-weight:700}
.sep{color:#4a6070}

#strip{display:flex;gap:4px;flex-shrink:0}
#strip .d{flex:1;text-align:center;min-width:0;background:rgba(255,255,255,.05);border-radius:8px;padding:5px 1px}
#strip .dname{font-size:clamp(.68rem,2.4vw,.84rem);color:#9fb3c8;font-weight:700}
#strip .dico{font-size:clamp(1.1rem,4.8vw,1.6rem);line-height:1.2;margin:1px 0}
#strip .dmax{font-size:clamp(.74rem,2.9vw,.94rem);font-weight:800;color:#fbbf24}
#strip .dmin{font-size:clamp(.68rem,2.5vw,.86rem);color:#7dd3fc;font-weight:700}
#strip .ddet{display:flex;flex-direction:column;gap:1px;margin-top:3px;padding-top:3px;border-top:1px solid rgba(255,255,255,.08)}
#strip .drain{font-size:clamp(.58rem,2vw,.74rem);font-weight:800;color:#60a5fa}
#strip .dwind{font-size:clamp(.58rem,2vw,.74rem);font-weight:800;color:#34d399}
#strip .ddew{font-size:clamp(.56rem,1.9vw,.72rem);font-weight:800;color:#22d3ee}

#upd{position:fixed;top:6px;right:10px;font-size:.66rem;color:#46617f;font-weight:600;z-index:50}
/* Avertizări: fixate sus, deasupra cardului, ca să nu deschidă aplicația la click */
#offwarn{position:fixed;top:0;left:0;right:0;z-index:200;display:none;flex-direction:column;gap:4px;
  padding:6px 10px;background:rgba(5,10,18,.92);backdrop-filter:blur(8px)}
.ow-chips{display:flex;flex-wrap:wrap;gap:5px}
.ow-chip{display:inline-flex;align-items:center;gap:5px;cursor:pointer;border:1px solid;
  border-radius:18px;padding:5px 11px;font-weight:800;font-size:.8rem;line-height:1;font-family:inherit}
.ow-chip-ico{font-size:1.05rem;line-height:1}
.ow-chip-lbl{white-space:nowrap}
.ow-chip-caret{font-size:.68rem;opacity:.8}
.ow-chip:active{transform:scale(.96)}
.ow-panel{display:none;border:1px solid;border-radius:9px;padding:8px 11px;flex-direction:column;gap:3px;max-height:50vh;overflow-y:auto}
.ow-panel.open{display:flex}
.ow-panel-head{font-weight:800;font-size:.88rem;line-height:1.25}
.ow-panel-body{font-size:.78rem;line-height:1.45;font-weight:500;white-space:pre-wrap;margin-top:3px;padding-top:5px;border-top:1px solid rgba(255,255,255,.18)}
.ow-meta{font-size:.68rem;font-weight:700;opacity:.9}
.ow-note{font-size:.72rem;color:#bcd0e3;background:rgba(56,90,128,.16);border:1px solid #3b6291;border-radius:7px;padding:5px 9px;font-weight:600}
.ow-yellow{background:rgba(250,204,21,.16);border-color:#facc15;color:#fde047}
.ow-orange{background:rgba(251,146,60,.20);border-color:#fb923c;color:#fdba74}
.ow-red{background:rgba(239,68,68,.22);border-color:#ef4444;color:#fca5a5}
.ow-unknown{background:rgba(148,163,184,.16);border-color:#94a3b8;color:#cbd5e1}

/* Bara de controale fixa jos */
#ctrl-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(5,10,18,.96);backdrop-filter:blur(12px);
  border-top:1px solid rgba(255,255,255,.12);
  padding:6px 11px 8px;display:flex;flex-direction:column;gap:5px;
}
.ctrl-row{display:flex;align-items:center;gap:5px;flex-wrap:nowrap}
.ctrl-lbl{font-size:.68rem;color:#5a7390;font-weight:700;white-space:nowrap;min-width:38px}
.loc-btns{display:flex;gap:3px;flex-wrap:wrap;flex:1}
.loc-btn{font-size:.68rem;font-weight:700;padding:3px 7px;border-radius:5px;
  border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);
  color:#9fb3c8;cursor:pointer;white-space:nowrap;transition:all .18s}
.loc-btn.active{background:#0e4f73;color:#7dd3fc;border-color:#3b82f6}
.src-btns{display:flex;gap:3px;flex:1}
.src-btn{flex:1;font-size:.68rem;font-weight:700;padding:3px 4px;border-radius:5px;
  border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);
  color:#9fb3c8;cursor:pointer;text-align:center;transition:all .18s}
.src-btn.active{background:#064e3b;color:#34d399;border-color:#10b981}
.ref-row label{font-size:.68rem;color:#5a7390;font-weight:700;white-space:nowrap}
.ref-row select{background:#0d1a27;color:#cfe0f2;border:1px solid rgba(255,255,255,.18);
  border-radius:5px;padding:3px 4px;font-size:.68rem;font-weight:700;flex:1}

@keyframes refreshFlash{
  0%{border-color:rgba(255,255,255,.08)}
  30%{border-color:#10b981;box-shadow:0 0 16px rgba(16,185,129,.3)}
  100%{border-color:rgba(255,255,255,.08)}
}
</style>
</head>
<body>
<!-- Avertizări oficiale: ÎN AFARA link-ului, ca să nu deschidă aplicația la click -->
<div id="offwarn"></div>
<a id="card" href="./MeteoDaneti.html" target="_blank" rel="noopener" title="Deschide aplicația completă">
  <div class="row1">
    <span class="ico" id="w-ico">🌦</span>
    <div class="tblock">
      <div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap">
        <span class="temp" id="w-temp">—<span class="unit">°C</span></span>
        <span id="w-clock" style="font-size:clamp(1.6rem,7vw,2.4rem);font-weight:800;letter-spacing:.04em"></span>
      </div>
      <span class="sub" id="w-sub">Se încarcă…</span>
      <span class="loc" id="w-loc"></span>
    </div>
  </div>
  <div class="lines" id="lines"></div>
  <div id="strip"></div>
  <span id="upd" style="position:absolute;bottom:8px;right:14px;font-size:.72rem;color:#46617f;font-weight:600"></span>
</a>

<!-- Bara de controale — în afara link-ului, click-urile nu deschid aplicația principală -->
<div id="ctrl-bar">
  <div class="ctrl-row">
    <span class="ctrl-lbl">📍 Loc:</span>
    <div class="loc-btns">
      <button class="loc-btn active" id="btn-daneti"  onclick="setLoc('daneti')">Daneți</button>
      <button class="loc-btn"        id="btn-craiova" onclick="setLoc('craiova')">Craiova</button>
      <button class="loc-btn"        id="btn-york"    onclick="setLoc('york')">York</button>
      <button class="loc-btn"        id="btn-raieti"  onclick="setLoc('raieti')">Raieti</button>
    </div>
  </div>
  <!-- Câmp căutare liberă -->
  <div class="ctrl-row" style="gap:4px">
    <input id="w-loc-q" type="text" placeholder="Caută altă locație…" autocomplete="off"
      style="flex:1;background:#0d1a27;color:#cfe0f2;border:1px solid rgba(255,255,255,.2);border-radius:6px;
             padding:4px 8px;font-size:.72rem;font-weight:600;outline:none"
      onkeydown="if(event.key==='Enter')searchWidgetLoc()"
      oninput="el('w-loc-res').style.display='none'">
    <button onclick="searchWidgetLoc()"
      style="background:#0e4f73;color:#7dd3fc;border:1px solid #3b82f6;border-radius:6px;
             padding:4px 10px;font-size:.72rem;font-weight:700;cursor:pointer;white-space:nowrap">Caută</button>
  </div>
  <!-- Rezultate căutare -->
  <div id="w-loc-res" style="display:none;flex-direction:column;gap:3px;max-height:120px;overflow-y:auto"></div>
  <div class="ctrl-row">
    <span class="ctrl-lbl">🛰 Surse:</span>
    <div class="src-btns">
      <button class="src-btn active" id="btn-best"  onclick="setSrc('best')">Best</button>
      <button class="src-btn"        id="btn-toate" onclick="setSrc('toate')">Toate</button>
      <button class="src-btn"        id="btn-none"  onclick="setSrc('none')">Niciuna</button>
    </div>
  </div>
  <div class="ctrl-row ref-row">
    <label>⏲ Actualizare:</label>
    <select id="w-refresh-sel" onchange="setWidgetRefreshInterval(this.value)">
      <option value="15">15 min</option><option value="30">30 min</option>
      <option value="45">45 min</option><option value="60">1 h</option>
      <option value="75">1 h 15</option><option value="90">1 h 30</option>
      <option value="105">1 h 45</option><option value="120">2 h</option>
      <option value="135">2 h 15</option><option value="150">2 h 30</option>
      <option value="165">2 h 45</option><option value="180">3 h</option>
    </select>
  </div>
</div>
<script>
// ═══════════════════════════════════════════════════════════════════════════
// MeteoLocal — WIDGET compact. Motorul de date e identic cu MeteoDaneti.html
// (aceleași modele, ponderi, agregare, probabilitate ensemble) — copiat aici
// ca să funcționeze independent, ca pagină separată, fără aplicația principală.
// ═══════════════════════════════════════════════════════════════════════════
let LAT=43.983, LON=24.050, TZ='Europe/Bucharest', LOC_NAME='Daneti, Dolj';
let ELEV_OVERRIDE=null;
let WIND_MIN=8, RAIN_MIN=4.0;
let P_LOW=40, P_HIGH=70;
let FROST_T=0, HEAT_T=35;
const FCST_DAYS=14, ENS_DAYS=2;
const ZILE_LUNG=['Duminică','Luni','Marți','Miercuri','Joi','Vineri','Sâmbătă'];
const LUNI=['ianuarie','februarie','martie','aprilie','mai','iunie','iulie','august','septembrie','octombrie','noiembrie','decembrie'];
const RAIN_EVENT_MM=10;
const NOTIF_ADVANCE=3600000;  // alertă cu max. 1 oră înainte (ms)
const ARROWS=['↓','↙','←','↖','↑','↗','→','↘'];
const CARD=['N','NE','E','SE','S','SV','V','NV'];
const SYNC_KEY='meteo_widget_sync';        // canal bidirecțional widget↔MeteoDaneti
const REFRESH_KEY='meteo_refresh_min';
let REFRESH_MS=15*60*1000;                 // implicit 15 min; reconfigurabil
let _refreshTimer=null;
function windArrow(deg){if(deg==null)return '·';return ARROWS[Math.round(deg/45)%8];}
function windCard(deg){if(deg==null)return '—';return CARD[Math.round(deg/45)%8];}

const HOME={lat:43.983,lon:24.050,tz:'Europe/Bucharest',name:'Daneti, Dolj',elev:110};
const LS_KEY='meteo_settings_v2';
const OM_MODELS=[
  {id:'ecmwf_ifs',                 lbl:'ECMWF IFS 9km',     flag:'🇪🇺', weight:3.0, type:'global'},   // 9 km nativ (era ecmwf_ifs025 / 25km)
  {id:'ecmwf_aifs025',             lbl:'ECMWF AIFS (AI)',   flag:'🤖', weight:2.5, type:'global'},   // model AI ECMWF, perspectivă independentă
  {id:'icon_seamless',             lbl:'DWD ICON',           flag:'🇩🇪', weight:2.5, type:'global'},
  {id:'meteofrance_arpege_europe', lbl:'ARPEGE Europa',      flag:'🇫🇷', weight:2.0, type:'regional'}, // 11 km regional european, acoperă România
  {id:'meteofrance_seamless',      lbl:'AROME/MF',           flag:'🇫🇷', weight:2.0, type:'regional'},
  {id:'gfs_seamless',              lbl:'NOAA GFS',           flag:'🌐', weight:1.0, type:'global'},
  {id:'ukmo_seamless',             lbl:'UK Met Office',      flag:'🇬🇧', weight:1.5, type:'global'},   // UKV 2km la York/UK, Global 10km în rest
  {id:'bom_access_global',         lbl:'ACCESS-G AUS',       flag:'🇦🇺', weight:1.0, type:'global'},
  // ── Modele regionale (mare rezoluție) ─────────────────────────────────────
  {id:'knmi_seamless',             lbl:'KNMI HARMONIE',      flag:'🇳🇱', weight:2.5, type:'regional'},  // ~5.5 km, acoperă România
  {id:'italia_meteo_arpae_icon_2i',lbl:'ItaliaMeteo ICON-2I',flag:'🇮🇹', weight:2.0, type:'regional', days:3}, // doar Italia/sudul Europei
  {id:'geosphere_seamless',        lbl:'GeoSphere Austria',  flag:'🇦🇹', weight:2.0, type:'regional'},
  {id:'dmi_seamless',              lbl:'DMI Denmark Harm.',  flag:'🇩🇰', weight:1.5, type:'regional'},
];
const METNO={id:'metno_direct',lbl:'MetNo Direct',flag:'🇳🇴', weight:1.5, type:'global'};
const ENS_MODELS=[
  {id:'ens_ecmwf', model:'ecmwf_ifs025', lbl:'ECMWF ENS (51 membri)', flag:'🎯', weight:4.0, type:'global',   ensemble:true},
  {id:'ens_icon',  model:'icon_eu',      lbl:'ICON-EU EPS (40 membri)',flag:'🎯', weight:3.5, type:'regional', ensemble:true},
];
const CRAIOVA={lat:44.320,lon:23.800,tz:'Europe/Bucharest',name:'Craiova, Dolj',elev:100};
const YORK   ={lat:53.959,lon:-1.082,tz:'Europe/London',   name:'York, UK'};
const RAIETI ={lat:43.900,lon:23.954,tz:'Europe/Bucharest',name:'Raieti, Sadova, Dolj'};const dkNow =()=>lparts(new Date()).dk;
const hNow  =()=>lparts(new Date()).h;
const dkTomr=()=>lparts(new Date(Date.now()+86400000)).dk;
const fH    =h=>String(h).padStart(2,'0')+':00';function lparts(date){
  const f=new Intl.DateTimeFormat('en',{timeZone:TZ,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',hour12:false});
  const p={};f.formatToParts(date).forEach(x=>p[x.type]=x.value);
  const h=parseInt(p.hour);return{dk:`${p.year}-${p.month}-${p.day}`,h:h===24?0:h};
}

function advDay(dk){const[y,m,d]=dk.split('-').map(Number);return lparts(new Date(y,m-1,d,12,0,0,0).valueOf()+86400000).dk;}

function dow(dk){const[y,m,d]=dk.split('-').map(Number);return new Date(y,m-1,d,12).getDay();}

function dDay(dk){return parseInt(dk.split('-')[2],10);}

function dMon(dk){return parseInt(dk.split('-')[1],10);}

function roDateLong(dk){return ZILE_LUNG[dow(dk)]+' '+dDay(dk)+' '+LUNI[dMon(dk)-1]+' '+dk.split('-')[0];}

function next7days(){const a=[];let dk=dkNow();for(let i=0;i<7;i++){a.push(dk);dk=advDay(dk);}return a;}

function mean(a){const v=a.filter(x=>x!=null&&!isNaN(x));return v.length?v.reduce((s,x)=>s+x,0)/v.length:null;}

function pctl(a,q){
  const v=a.filter(x=>x!=null&&!isNaN(x)).sort((x,y)=>x-y);
  if(!v.length)return null;
  const idx=(v.length-1)*q/100, lo=Math.floor(idx), hi=Math.ceil(idx);
  if(lo===hi)return v[lo];
  return v[lo]+(v[hi]-v[lo])*(idx-lo);
}

function circMean(degs,weights){
  const v=[];degs.forEach((d,i)=>{if(d!=null&&!isNaN(d))v.push([d,weights?weights[i]:1]);});
  if(!v.length)return null;
  let sx=0,sy=0,wt=0;
  v.forEach(([d,w])=>{const r=d*Math.PI/180;sx+=Math.cos(r)*w;sy+=Math.sin(r)*w;wt+=w;});
  if(wt===0)return null;
  let a=Math.atan2(sy,sx)*180/Math.PI;return (a+360)%360;
}

function groupIvs(hrs){
  if(!hrs.length)return[];
  const s=[...new Set(hrs)].sort((a,b)=>a-b);const out=[];let c={s:s[0],e:s[0]};
  for(let i=1;i<s.length;i++){if(s[i]===c.e+1)c.e=s[i];else{out.push(c);c={s:s[i],e:s[i]};}}
  out.push(c);
  return out.map(iv=>iv.s===iv.e?fH(iv.s):`${fH(iv.s)}–${fH(Math.min(iv.e+1,24))}`);
}

function tempCross(dayHrs,warm){
  const m=dayHrs.filter(h=>h.tMean!=null&&(warm?h.tMean>=HEAT_T:h.tMean<=FROST_T));
  if(!m.length)return null;
  const temps=m.map(h=>h.tMean);
  return{ivs:groupIvs(m.map(h=>h.h)),extreme:Math.round(warm?Math.max(...temps):Math.min(...temps))};
}

function nextRainEvent(hours){
  const rateThr=0.05;   // fix independent de RAIN_MIN — condiția de bază e doar totalul >10 l/mp
  const dk0=dkNow(),h0=hNow();
  const fut=hours.filter(h=>h.dk>dk0||(h.dk===dk0&&h.h>=h0));
  let i=0;
  while(i<fut.length){
    if((fut[i].pMean||0)>=rateThr){
      let j=i,total=0;
      // extinde episodul DOAR cât timp fiecare oră următoare e încă peste prag (strict consecutiv);
      // prima oră care nu îndeplinește pragul ÎNCHEIE definitiv episodul curent (fără bridging)
      while(j<fut.length&&(fut[j].pMean||0)>=rateThr){total+=fut[j].pMean||0;j++;}
      if(total>RAIN_EVENT_MM){
        const sH=fut[i].h,eH=fut[j-1].h+1;
        const endTxt=eH>=24?'00:00 (ziua urm.)':fH(eH);
        return{dk:fut[i].dk,total:Math.round(total*10)/10,from:fH(sH),to:endTxt};
      }
      i=j;                                  // episodul curent nu a calificat ⇒ sare la oră de DUPĂ pauză, caută următorul episod
    } else i++;
  }
  return null;                              // nicio perioadă care îndeplinește condiția în orizontul disponibil
}

function buildMap(results){
  const m={};
  results.forEach(r=>{
    const d=r.model;
    r.hourly.forEach(e=>{
      const k=e.dk+'-'+String(e.h).padStart(2,'0');
      if(!m[k])m[k]={dk:e.dk,h:e.h,srcs:[]};
      m[k].srcs.push({
        id:d.id, weight:d.weight||1, type:d.type||'global', ensemble:!!d.ensemble,
        t:e.t, at:e.at, dp:e.dp, w:e.w, wd:e.wd, p:e.p, pp:e.pp, cloud:e.cloud??null,
        pMembers:e.pMembers||null, wMembers:e.wMembers||null, tMembers:e.tMembers||null,
      });
    });
  });
  return m;
}

function tempFactor(type,h){
  const aft = h>=11 && h<=20;          // fereastra convectivă
  if(type==='regional') return aft?1.35:1.0;
  return aft?1.0:1.10;                  // global
}

function wMeanPairs(pairs){
  let sv=0,sw=0;
  pairs.forEach(([v,w])=>{if(v!=null&&!isNaN(v)&&w>0){sv+=v*w;sw+=w;}});
  return sw?sv/sw:null;
}

function computeHour(e){
  if(!e||!e.srcs||!e.srcs.length)return null;
  const srcs=e.srcs;
  const Wbase=srcs.map(s=>(s.weight||1));                       // ponderi de bază (fiabilitate model)
  const Wconv=srcs.map((s,i)=>Wbase[i]*tempFactor(s.type,e.h)); // + modulare temporală (DOAR convecție: ploaie/vânt)

  // Temperatura/punct de rouă: ponderi de BAZĂ, fără modulare convectivă (Pilon D — corecție)
  const tM =wMeanPairs(srcs.map((s,i)=>[s.t,  Wbase[i]]));
  const atM=wMeanPairs(srcs.map((s,i)=>[s.at, Wbase[i]]));
  const dpM=wMeanPairs(srcs.map((s,i)=>[s.dp, Wbase[i]]));
  // Vânt: ponderi convective
  const wM =wMeanPairs(srcs.map((s,i)=>[s.w,  Wconv[i]]));
  const pM =wMeanPairs(srcs.map((s,i)=>[s.p,  Wconv[i]]));
  const cloudM=wMeanPairs(srcs.map((s,i)=>[s.cloud, Wbase[i]]));   // acoperire nori (%) pt sumar
  const wDir=circMean(srcs.map(s=>s.wd), srcs.map((s,i)=>Wconv[i]));

  // ── Bandă de incertitudine temperatură (Pilon B): P10–P90 din toți membrii ensemble ──
  let tMembersAll=[];
  srcs.forEach(s=>{if(s.ensemble&&s.tMembers&&s.tMembers.length)tMembersAll=tMembersAll.concat(s.tMembers);});
  const tLo=tMembersAll.length?pctl(tMembersAll,10):null;
  const tHi=tMembersAll.length?pctl(tMembersAll,90):null;

  // alias pentru restul codului (probabilități ploaie/vânt folosesc ponderi convective)
  const W=Wconv;

  // ── PLOAIE: probabilitate cât mai fiabilă ────────────────────────────────
  // (a) ENSEMBLE real: % membri cu precip ≥ RAIN_MIN, mediat ponderat între modelele ensemble
  let ensSv=0,ensSw=0;
  srcs.forEach((s,i)=>{if(s.ensemble&&s.pMembers&&s.pMembers.length){
    const frac=s.pMembers.filter(p=>p>=RAIN_MIN).length/s.pMembers.length*100;
    ensSv+=frac*W[i];ensSw+=W[i];
  }});
  const ensRainProb=ensSw?ensSv/ensSw:null;
  // (b) câmpul pp% al modelelor deterministe (ponderat)
  const ppPairs=srcs.filter(s=>!s.ensemble&&s.pp!=null).map((s,idx)=>{
    const i=srcs.indexOf(s);return[s.pp,W[i]];});
  const ppAvg=ppPairs.length?wMeanPairs(ppPairs):null;
  // (c) consens determinist ponderat: % pondere care prevede precip ≥ RAIN_MIN
  let detSv=0,detSw=0;
  srcs.forEach((s,i)=>{if(s.p!=null){detSw+=W[i];if(s.p>=RAIN_MIN)detSv+=W[i];}});
  const detRain=detSw?detSv/detSw*100:0;
  // combinație prioritizată: ensemble > pp% > consens
  // PRIORITATE: probabilitate REALĂ din ensemble (azi+mâine). Doar dacă lipsește ⇒ pp%/consens.
  let rainProb;
  if(ensRainProb!=null)                   rainProb=ensRainProb;            // ensemble pur
  else if(ppAvg!=null)                    rainProb=0.60*ppAvg+0.40*detRain;
  else                                    rainProb=detRain;
  rainProb=Math.round(rainProb);
  const rainSrcPct=Math.round(detRain);

  // ── VÂNT: ensemble real (% membri ≥ WIND_MIN) + consens ponderat ─────────
  let ewSv=0,ewSw=0;
  srcs.forEach((s,i)=>{if(s.ensemble&&s.wMembers&&s.wMembers.length){
    const frac=s.wMembers.filter(w=>w>=WIND_MIN).length/s.wMembers.length*100;
    ewSv+=frac*W[i];ewSw+=W[i];
  }});
  const ensWindProb=ewSw?ewSv/ewSw:null;
  let detWSv=0,detWSw=0;
  srcs.forEach((s,i)=>{if(s.w!=null){detWSw+=W[i];if(s.w>=WIND_MIN)detWSv+=W[i];}});
  const detWind=detWSw?detWSv/detWSw*100:0;
  let windProb=(ensWindProb!=null)?ensWindProb:detWind;   // ensemble pur dacă există, altfel consens
  windProb=Math.round(windProb);

  return{
    dk:e.dk,h:e.h,
    tMean:tM!=null?Math.round(tM*10)/10:null,
    tLo:tLo!=null?Math.round(tLo*10)/10:null,
    tHi:tHi!=null?Math.round(tHi*10)/10:null,
    atMean:atM!=null?Math.round(atM*10)/10:null,
    dpMean:dpM!=null?Math.round(dpM*10)/10:null,
    wMean:wM!=null?Math.round(wM):null,
    wDir,
    pMean:pM!=null?Math.round(pM*10)/10:null,
    cloudMean:cloudM!=null?Math.round(cloudM):null,
    rainProb,rainSrcPct,windProb,
    hasEns:ensSw>0,                       // marcaj: oră acoperită de ensemble (azi/mâine)
  };
}

function allHours(map){
  const dk0=dkNow(),h0=hNow();
  return Object.keys(map).sort().map(k=>{
    const s=computeHour(map[k]);if(!s)return null;
    s.isNow=(s.dk===dk0&&s.h===h0);return s;
  }).filter(Boolean);
}

function dayHours(hours,dk){return hours.filter(h=>h.dk===dk).sort((a,b)=>a.h-b.h);}

function dayStats(hours,dk){
  const dh=dayHours(hours,dk);if(!dh.length)return null;
  const temps=dh.map(h=>h.tMean).filter(v=>v!=null);
  const dews=dh.map(h=>h.dpMean).filter(v=>v!=null);
  const winds=dh.map(h=>h.wMean).filter(v=>v!=null);
  const totP=Math.round(dh.reduce((s,h)=>s+(h.pMean||0),0)*10)/10;
  const predDir=circMean(dh.map(h=>h.wDir),dh.map(h=>h.wMean||0.1));
  return{
    dk,
    tmin:temps.length?Math.round(Math.min(...temps)):null,
    tmax:temps.length?Math.round(Math.max(...temps)):null,
    totP,
    wmax:winds.length?Math.max(...winds):null,
    predDir,
    dpAvg:dews.length?Math.round(mean(dews)):null,
  };
}

function frostHeatProb(dk){
  const results=_lastResults||[];
  const mins=[],maxs=[];
  results.forEach(r=>{
    if(!r.ok||!r.model.ensemble||!selectedSources.has(r.model.id))return;
    const dh=r.hourly.filter(h=>h.dk===dk&&h.tMembers&&h.tMembers.length);
    if(!dh.length)return;
    const nMem=Math.max(...dh.map(h=>h.tMembers.length));
    for(let j=0;j<nMem;j++){
      let mn=Infinity,mx=-Infinity,any=false;
      dh.forEach(h=>{const v=h.tMembers[j];if(v!=null&&!isNaN(v)){any=true;if(v<mn)mn=v;if(v>mx)mx=v;}});
      if(any){mins.push(mn);maxs.push(mx);}
    }
  });
  if(!mins.length)return null;
  return{
    frostP:Math.round(mins.filter(v=>v<=FROST_T).length/mins.length*100),
    heatP :Math.round(maxs.filter(v=>v>=HEAT_T).length/maxs.length*100),
    n:mins.length,
  };
}

function condIcon(h){
  if(!h)return{i:'🌡',t:'—'};
  const t=h.tMean, p=h.pMean||0, c=h.cloudMean, dp=h.dpMean, w=h.wMean||0;
  if(t!=null&&dp!=null&&(t-dp)<1.5 && w<7 && (c==null||c>70) && p<0.3) return{i:'🌫',t:'Ceață'};
  if(p>=0.2){
    if(t!=null&&t<=0)  return{i:'❄',t:'Ninsoare'};
    if(t!=null&&t<=2)  return{i:'🌨',t:'Lapoviță'};
    if(p<0.6)          return{i:'🌦',t:'Burniță'};
    if(p>=4)           return{i:'⛈',t:'Ploaie puternică'};
    return{i:'🌧',t:'Ploaie'};
  }
  if(c==null)          return{i:'🌡',t:'—'};
  if(c<15)             return{i:'☀',t:'Cer senin'};
  if(c<50)             return{i:'🌤',t:'Parțial însorit'};
  if(c<85)             return{i:'⛅',t:'Noros'};
  return{i:'☁',t:'Cer acoperit'};
}

function precipLabel(h){
  const t=h?h.tMean:null, p=h?(h.pMean||0):0;
  if(t!=null&&t<=0)return{i:'❄',t:'Ninsoare'};
  if(t!=null&&t<=2)return{i:'🌨',t:'Lapoviță'};
  if(p>0&&p<0.6)   return{i:'🌦',t:'Burniță'};
  return{i:'🌧',t:'Ploaie'};
}

function inBox(lat,lon,latMin,latMax,lonMin,lonMax){return lat>=latMin&&lat<=latMax&&lon>=lonMin&&lon<=lonMax;}

function bestIdsFor(lat,lon){
  // ── SE Europa / România (Oltenia: Craiova, Daneti, Raieti) ───────────────
  // 6 surse: ECMWF ENS + ICON EPS (ancore) + ECMWF IFS 9km + KNMI HARMONIE (regional fin)
  //          + ARPEGE Europa (independent francez) + ECMWF AIFS (perspectivă AI)
  // ICON determinist e eliminat — ens_icon îl reprezintă (corelație).
  if(inBox(lat,lon,42.5,48.5,19,30))
    return['ens_ecmwf','ens_icon','ecmwf_ifs','knmi_seamless','meteofrance_arpege_europe','ecmwf_aifs025'];

  // ── Regatul Unit & Irlanda — 5 surse ─────────────────────────────────────
  // UKMO (sursa țării, UKV 2km) + ECMWF ENS/ICON EPS (ancore) + ECMWF IFS + AIFS
  // KNMI scos: corelat cu UKMO/ICON pe domeniul Mării Nordului
  if(inBox(lat,lon,49.5,61,-9,2.2))
    return['ens_ecmwf','ens_icon','ukmo_seamless','ecmwf_ifs','ecmwf_aifs025'];

  // ── Franța (incl. Corsica) — 5 surse ────────────────────────────────────
  // AROME/MF (sursa țării, 1.3km în Franța) + ARPEGE Europa (regional MF)
  // + 2 ensemble + ECMWF IFS. AIFS scos: 5 surse e suficient, AROME+ARPEGE acoperă regional.
  if(inBox(lat,lon,41,51.5,-5.5,9.8))
    return['ens_ecmwf','ens_icon','meteofrance_seamless','meteofrance_arpege_europe','ecmwf_ifs'];

  // ── Italia (incl. insule) — 5 surse ──────────────────────────────────────
  // ItaliaMeteo ICON-2I (sursa țării, 2km) + 2 ensemble + ECMWF IFS + AIFS
  // GeoSphere scos: corelație ICON cu ItaliaMeteo (ambele ICON), AIFS aduce mai multă diversitate
  if(inBox(lat,lon,36,47.5,6,18.8))
    return['ens_ecmwf','ens_icon','italia_meteo_arpae_icon_2i','ecmwf_ifs','ecmwf_aifs025'];

  // ── Austria / Elveția / sudul Germaniei (Alpi) — 5 surse ─────────────────
  // GeoSphere (sursa zonei, AROME alpin 2.5km) + 2 ensemble + ECMWF IFS + AIFS
  if(inBox(lat,lon,45.5,49.5,5.5,17.5))
    return['ens_ecmwf','ens_icon','geosphere_seamless','ecmwf_ifs','ecmwf_aifs025'];

  // ── Benelux / nordul Germaniei — 5 surse ─────────────────────────────────
  // KNMI HARMONIE (sursa zonei, ~2.5km) + 2 ensemble + ECMWF IFS + ARPEGE Europa
  // ICON determinist scos: corelat cu ens_icon
  if(inBox(lat,lon,47,55.5,-2,9))
    return['ens_ecmwf','ens_icon','knmi_seamless','ecmwf_ifs','meteofrance_arpege_europe'];

  // ── Scandinavia / Țările Baltice — 5 surse ──────────────────────────────
  // DMI Harmonie + MET Norway (surse naționale) + 2 ensemble + ECMWF IFS
  if(inBox(lat,lon,54.5,71.5,4,31))
    return['ens_ecmwf','ens_icon','dmi_seamless','metno_direct','ecmwf_ifs'];

  // ── Restul Europei (Iberia, Balcani, Polonia, Grecia, Turcia etc.) — 5 surse ─
  // Fără model național dedicat: ECMWF IFS + 2 ensemble + KNMI/ARPEGE (regional)
  if(inBox(lat,lon,34,72,-12,45))
    return['ens_ecmwf','ens_icon','ecmwf_ifs','knmi_seamless','meteofrance_arpege_europe'];

  // ── America de Nord (SUA/Canada/Mexic) — 4 surse ────────────────────────
  // GFS (sursa zonei, include HRRR în SUA) + ECMWF ENS + ECMWF IFS + AIFS
  // ICON EPS scos: ICON-EU n-are acoperire bună pentru AN, doar ICON-global (corelat)
  if(inBox(lat,lon,14,72,-170,-50))
    return['ens_ecmwf','gfs_seamless','ecmwf_ifs','ecmwf_aifs025'];

  // ── Australia / Oceania — 4 surse ───────────────────────────────────────
  // ACCESS-G (BOM, sursa zonei) + ECMWF ENS + ECMWF IFS + AIFS
  if(inBox(lat,lon,-48,-9,109,179))
    return['ens_ecmwf','bom_access_global','ecmwf_ifs','ecmwf_aifs025'];

  // ── Restul lumii: Asia, Asia Mică, Africa, America de Sud — 3 surse ─────
  // Fără model regional disponibil. Top global GENUIN independente:
  // ECMWF ENS (ancoră probabilistică) + ECMWF IFS 9km + AIFS (AI, paradigmă diferită).
  // ICON scos: în afara Europei e doar ICON-global, corelat cu ECMWF (asimilare similară).
  return['ens_ecmwf','ecmwf_ifs','ecmwf_aifs025'];
}

async function fetchOM(model){
  const ctrl=new AbortController(),tid=setTimeout(()=>ctrl.abort(),14000);
  const fcDays=model.days||FCST_DAYS;
  try{
    const p=new URLSearchParams({latitude:LAT,longitude:LON,
      hourly:'temperature_2m,apparent_temperature,dew_point_2m,precipitation,precipitation_probability,wind_speed_10m,wind_direction_10m,cloud_cover',
      models:(model.model||model.id),timezone:TZ,forecast_days:String(fcDays),wind_speed_unit:'kmh'});
    if(ELEV_OVERRIDE!=null)p.set('elevation',String(ELEV_OVERRIDE)); // altfel: downscaling automat DEM (Pilon A)
    const r=await fetch('https://api.open-meteo.com/v1/forecast?'+p,{signal:ctrl.signal});
    clearTimeout(tid);if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();const H=d.hourly;
    if(!H||!H.time||!H.time.length)throw new Error('no data');
    const mapped=H.time.map((ts,i)=>({
      dk:ts.split('T')[0],h:parseInt(ts.split('T')[1]),
      t:H.temperature_2m?.[i]??null,
      at:H.apparent_temperature?.[i]??null,
      dp:H.dew_point_2m?.[i]??null,
      w:H.wind_speed_10m?.[i]??0,
      wd:H.wind_direction_10m?.[i]??null,
      p:H.precipitation?.[i]??0,
      pp:H.precipitation_probability?.[i]??null,
      cloud:H.cloud_cover?.[i]??null,
    }));
    // dacă modelul nu acoperă locația, returnează doar null-uri ⇒ îl marcăm inactiv
    if(!mapped.some(x=>x.t!=null))throw new Error('no coverage');
    return{model,ok:true,hourly:mapped,elevation:(typeof d.elevation==='number'?d.elevation:null)};
  }catch(e){clearTimeout(tid);return{model,ok:false,hourly:[]};}
}

async function fetchEns(desc){
  const ctrl=new AbortController(),tid=setTimeout(()=>ctrl.abort(),16000);
  try{
    const p=new URLSearchParams({latitude:LAT,longitude:LON,
      hourly:'temperature_2m,apparent_temperature,dew_point_2m,precipitation,wind_speed_10m,wind_direction_10m',
      models:desc.model,timezone:TZ,forecast_days:String(ENS_DAYS),wind_speed_unit:'kmh'});

    const r=await fetch('https://ensemble-api.open-meteo.com/v1/ensemble?'+p,{signal:ctrl.signal});
    clearTimeout(tid);if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();const H=d.hourly;
    if(!H||!H.time||!H.time.length)throw new Error('no data');
    // chei membri: "precipitation", "precipitation_member01", ... idem temperature/wind
    const keysFor=base=>Object.keys(H).filter(k=>k===base||k.startsWith(base+'_member'));
    const pK=keysFor('precipitation'), wK=keysFor('wind_speed_10m'),
          tK=keysFor('temperature_2m'), atK=keysFor('apparent_temperature'),
          dpK=keysFor('dew_point_2m'), wdK=keysFor('wind_direction_10m');
    const at=(arr,i)=>arr.map(k=>H[k][i]).filter(v=>v!=null&&!isNaN(v));
    const mapped=H.time.map((ts,i)=>{
      const pM=at(pK,i), wM=at(wK,i), tM=at(tK,i), atM=at(atK,i), dpM=at(dpK,i);
      return{dk:ts.split('T')[0],h:parseInt(ts.split('T')[1]),
        t:mean(tM), at:mean(atM), dp:mean(dpM),
        w:mean(wM), wd:circMean(at(wdK,i)),
        p:mean(pM), pp:null,
        pMembers:pM, wMembers:wM, tMembers:tM};   // tMembers ⇒ bandă de incertitudine temperatură
    });
    if(!mapped.some(x=>x.t!=null))throw new Error('no coverage');
    return{model:desc,ok:true,hourly:mapped,elevation:(typeof d.elevation==='number'?d.elevation:null)};
  }catch(e){clearTimeout(tid);return{model:desc,ok:false,hourly:[]};}
}

function groupEvents(hours,type,probMin){
  const now=Date.now();
  const match=hours.filter(h=>{
    const t=new Date(h.dk+'T'+String(h.h).padStart(2,'0')+':00:00').getTime();
    if(t<=now)return false;
    if(type==='rain')
      return(h.pMean||0)>=RAIN_MIN && h.rainProb>probMin;   // h.rainProb = probabilitate reală ensemble (azi+mâine)
    return(h.wMean||0)>=WIND_MIN && h.windProb>probMin;     // h.windProb = probabilitate reală ensemble
  });
  if(!match.length)return[];
  const evs=[];let cur={s:match[0],e:match[0]};
  for(let i=1;i<match.length;i++){
    const pt=new Date(match[i-1].dk+'T'+String(match[i-1].h).padStart(2,'0')+':00:00').getTime();
    const ct=new Date(match[i].dk+'T'+String(match[i].h).padStart(2,'0')+':00:00').getTime();
    if(ct-pt<=3600000)cur.e=match[i];
    else{evs.push({...cur});cur={s:match[i],e:match[i]};}
  }
  evs.push(cur);return evs;
}
// ── Notificări ploaie/vânt (identic cu aplicația principală; folosesc aceeași
// cheie 'mn_notified' din localStorage, deci widget-ul și aplicația nu se
// dublează niciodată — oricare dintre ele e deschisă, o alertă se trimite o singură dată) ──
function getNotified(){
  try{return JSON.parse(localStorage.getItem('mn_notified')||'{}');}catch(e){return{};}
}
function markNotified(key){
  const ev=getNotified();ev[key]=Date.now();
  Object.keys(ev).forEach(k=>{if(Date.now()-ev[k]>172800000)delete ev[k];});
  try{localStorage.setItem('mn_notified',JSON.stringify(ev));}catch(e){}
}
function beep(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,0.35,0.70].forEach(delay=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';o.frequency.setValueAtTime(880,ctx.currentTime+delay);
      g.gain.setValueAtTime(0.5,ctx.currentTime+delay);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+0.28);
      o.start(ctx.currentTime+delay);o.stop(ctx.currentTime+delay+0.28);
    });
  }catch(e){}
}
function showToast(title,body){
  let t=document.getElementById('notif-toast');
  if(!t){
    t=document.createElement('div');t.id='notif-toast';
    t.style.cssText='position:fixed;top:14px;left:50%;transform:translateX(-50%);'+
      'background:#065f46;color:#d1fae5;padding:14px 18px;border-radius:11px;'+
      'font-size:1.02rem;z-index:9999;max-width:92vw;box-shadow:0 6px 22px rgba(0,0,0,.65);'+
      'text-align:center;line-height:1.45;border:1px solid #10b981';
    document.body.appendChild(t);
  }
  t.innerHTML='<b>'+title+'</b><br>'+body;
  t.style.display='block';
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>{t.style.display='none';},9000);
}
function fireNotif(title,body){
  beep();
  showToast(title,body);
  // Popup real de sistem (apare pe ecranul telefonului chiar dacă widget-ul nu e activ pe ecran)
  // — se închide singur după 8 secunde, ca să nu rămână agățat permanent în lista de notificări.
  if('Notification'in window&&Notification.permission==='granted'){
    try{
      const n=new Notification(title,{body,icon:'./icon-192.png',tag:'meteolocal-widget'});
      setTimeout(()=>{ try{n.close();}catch(e){} },8000);
    }catch(e){}
  }
}

function checkNotifications(hours){
  if(!hours.length)return;
  const notified=getNotified();
  const now=Date.now();
  ['rain','wind'].forEach(type=>{
    // Verifică ambele niveluri: probabilitate >40% și >70%
    [{prob:P_LOW,lvl:'low'},{prob:P_HIGH,lvl:'high'}].forEach(({prob,lvl})=>{
      groupEvents(hours,type,prob).forEach(ev=>{
        const startMs=new Date(ev.s.dk+'T'+String(ev.s.h).padStart(2,'0')+':00:00').getTime();
        const msUntil=startMs-now;
        const key=type+'-'+lvl+'-'+ev.s.dk+'-'+String(ev.s.h).padStart(2,'0');
        if(msUntil>0&&msUntil<=NOTIF_ADVANCE&&!notified[key]){
          markNotified(key);
          const from=fH(ev.s.h);
          const toH=ev.e.h+1;
          const to=toH>=24?'00:00 (ziua urm.)':fH(toH);
          const hi=lvl==='high';
          const prefix=hi?('Șanse >'+P_HIGH+'% '):'E posibil ';
          if(type==='rain')
            fireNotif(hi?('🌧 Ploaie probabilă >'+P_HIGH+'%'):'🌧 Posibilă ploaie',
              prefix+'să plouă de la ora '+from+' până la ora '+to);
          else
            fireNotif(hi?('💨 Vânt probabil >'+P_HIGH+'%'):'💨 Posibil vânt puternic',
              prefix+'să bată vântul de la ora '+from+' până la ora '+to);
        }
      });
    });
  });
}

function el(id){return document.getElementById(id);}

// Adresa aplicației complete. Implicit: același folder (cele 2 fișiere trebuie
// urcate împreună, în același deploy Netlify) — funcționează indiferent de domeniu.
const MAIN_APP_URL='./MeteoDaneti.html';
// Link real <a> (nu window.open din JS) — comportament mult mai predictibil pe Android
// la deschidere din PWA instalată. Reîmprospătăm href-ul cu un timestamp la fiecare
// randare, ca tap-ul să ceară mereu o versiune proaspătă, ocolind orice cache vechi.
function refreshMainAppLink(){
  const c=el('card');
  if(c)c.href=MAIN_APP_URL+'?t='+Date.now();
}

// Citește locația + pragurile salvate de aplicația principală (ACELAȘI LS_KEY,
// deci ACELAȘI localStorage — funcționează doar dacă widget-ul e servit din
// același domeniu/origine ca aplicația principală). Se re-citește la fiecare
// refresh, ca widget-ul să reflecte instant orice schimbare făcută în aplicație.
function loadSharedSettings(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw)return;
    const o=JSON.parse(raw);if(!o)return;
    if(o.thr){
      const T=o.thr;
      if(typeof T.RAIN_MIN==='number')RAIN_MIN=T.RAIN_MIN;
      if(typeof T.WIND_MIN==='number')WIND_MIN=T.WIND_MIN;
      if(typeof T.FROST_T==='number')FROST_T=T.FROST_T;
      if(typeof T.HEAT_T ==='number')HEAT_T =T.HEAT_T;
      if(typeof T.P_LOW  ==='number')P_LOW  =T.P_LOW;
      if(typeof T.P_HIGH ==='number')P_HIGH =T.P_HIGH;
    }
    if(o.loc&&typeof o.loc.lat==='number'&&typeof o.loc.lon==='number'){
      LAT=o.loc.lat;LON=o.loc.lon;TZ=o.loc.tz||TZ;LOC_NAME=o.loc.name||LOC_NAME;
      ELEV_OVERRIDE=(o.loc.elev!=null?o.loc.elev:null);
    }
  }catch(e){/* localStorage indisponibil ⇒ rămân valorile implicite (Daneti) */}
}

let _lastHours=[];
let _settingsLoaded=false;   // loadSharedSettings se apelează o singură dată la pornire
let _resolvedElev=null;      // altitudinea efectivă returnată de API (m)

async function loadWidget(){
  // La prima pornire: preia locația + pragurile din localStorage (setate de MeteoDaneti)
  // La refresh-urile ulterioare: preia DOAR pragurile (nu locația — ar anula selecția din widget)
  if(!_settingsLoaded){
    loadSharedSettings();
    _settingsLoaded=true;
    // sincronizează butoanele cu locația preluată
    document.querySelectorAll('.loc-btn').forEach(b=>b.classList.remove('active'));
    const btn=el('btn-'+_locKind);if(btn)btn.classList.add('active');
  } else {
    // la refresh ulterior: preia doar pragurile (nu locația — ar anula selecția din widget)
    try{
      const raw=localStorage.getItem(LS_KEY);
      if(raw){const o=JSON.parse(raw);if(o&&o.thr){const T=o.thr;
        if(typeof T.RAIN_MIN==='number')RAIN_MIN=T.RAIN_MIN;
        if(typeof T.WIND_MIN==='number')WIND_MIN=T.WIND_MIN;
        if(typeof T.FROST_T==='number')FROST_T=T.FROST_T;
        if(typeof T.HEAT_T==='number')HEAT_T=T.HEAT_T;
        if(typeof T.P_LOW==='number')P_LOW=T.P_LOW;
        if(typeof T.P_HIGH==='number')P_HIGH=T.P_HIGH;
      }}
    }catch(e){}
  }
  const ids=resolvedIds(LAT,LON);
  if(!ids.length){ renderError(); return; }
  const omPick =OM_MODELS.filter(m=>ids.includes(m.id));
  const ensPick=ENS_MODELS.filter(m=>ids.includes(m.id));
  let results;
  try{
    results=await Promise.all([...omPick.map(m=>fetchOM(m)),...ensPick.map(m=>fetchEns(m))]);
  }catch(e){ renderError(); scheduleRetry(); return; }
  const valid=results.filter(r=>r.ok&&r.hourly.length);
  if(!valid.length){ renderError(); scheduleRetry(); return; }
  // altitudinea efectivă returnată de API (DEM Open-Meteo, în metri)
  const elevResult=valid.find(r=>r.elevation!=null);
  if(elevResult)_resolvedElev=Math.round(elevResult.elevation);
  const map=buildMap(valid);
  const hours=allHours(map);
  _lastHours=hours;
  render(hours);
  flashCard();
  cycleClockColor();   // schimbă culoarea ceasului — confirmă vizual că refresh-ul a funcționat
  applyDynamicBg();    // fundal dinamic nou la fiecare actualizare
  refreshMainAppLink();
  checkNotifications(hours);
  fetchOfficialWarnings();     // avertizări oficiale — asincron izolat, nu blochează prognoza
}
function scheduleRetry(){ setTimeout(loadWidget,90000); }      // reîncearcă în 90s dacă rețeaua a picat

function renderError(){
  el('w-ico').textContent='⚠️';
  el('w-temp').innerHTML='—<span class="unit">°C</span>';
  el('w-sub').textContent='Eroare rețea — reîncerc…';
}

function render(hours){
  const dk0=dkNow(),h0=hNow();
  const cur=hours.find(h=>h.isNow)||dayHours(hours,dk0)[0]||null;
  if(!cur){ renderError(); return; }

  const cond=condIcon(cur);
  const t =cur.tMean!=null?Math.round(cur.tMean):null;
  const at=cur.atMean!=null?Math.round(cur.atMean):t;
  const ds=dayStats(hours,dk0);
  const maxToday=ds&&ds.tmax!=null?ds.tmax:null;

  el('w-ico').textContent=cond.i;
  el('w-temp').innerHTML=(t!=null?t:'—')+'<span class="unit">°C</span>';
  el('w-sub').textContent=cond.t+(at!=null?' · resimțit '+at+'°':'')+(maxToday!=null?' · Max '+maxToday+'°':'');

  // Locație: doar primul segment (ex. "Craiova" din "Craiova, Dolj") + altitudine
  const shortName=LOC_NAME.split(',')[0].trim();
  const elevTxt=_resolvedElev!=null?' · '+_resolvedElev+' m':'';
  // Indicator auto-învățare: verde dacă activ, galben dacă în colectare
  const ls=typeof learnStats==='function'?learnStats():null;
  const minSamples=typeof LEARN_MIN_SAMPLES==='number'?LEARN_MIN_SAMPLES:6;
  let learnIco='';
  if(ls){
    if(ls.active>0) learnIco=` <span style="color:#6ee7b7;font-size:.8em" title="Auto-corecție activă (${ls.active} ore)">🧠✓</span>`;
    else if(ls.total>0) learnIco=` <span style="color:#fbbf24;font-size:.8em" title="Colectez date (${ls.total}/${minSamples*24} comparații)">🧠…</span>`;
  }
  el('w-loc').innerHTML='📍 <b>'+shortName+'</b>'+elevTxt+learnIco;
  el('upd').textContent='↺ '+new Date().toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'});
  if(typeof tickWidgetClock==='function')tickWidgetClock();

  // ── Linii — PARITATE COMPLETĂ cu sumarul din MeteoDaneti.html (mm+% 1h/2h ploaie, km/h+% 1h/2h vânt) ──
  const up=hours.filter(h=>h.dk>dk0||(h.dk===dk0&&h.h>=h0)).slice(0,2);
  const h1=up[0]||cur, two=up.length?up:[cur];
  const nr1=v=>(Math.round(v*10)/10).toFixed(1).replace('.',',');
  const p1=h1.pMean||0, p2=two.reduce((s,h)=>s+(h.pMean||0),0);
  const rp1=h1.rainProb||0, rp2=Math.max(...two.map(h=>h.rainProb||0));
  const w1=h1.wMean||0, w2=Math.max(...two.map(h=>h.wMean||0));
  const wp1=h1.windProb||0, wp2=Math.max(...two.map(h=>h.windProb||0));
  const pl=precipLabel(h1);
  const hi=v=>v>=P_HIGH?'hi':'';
  const L=[];

  if(Math.max(rp1,rp2)>0){
    L.push(`<div class="line ${hi(Math.max(rp1,rp2))}">${pl.i} <b>${nr1(p1)} mm</b> · <b>${rp1}%</b>/1h `+
      `<span class="sep">·</span> <b>${nr1(p2)} mm</b> · <b>${rp2}%</b>/2h</div>`);
  }
  if(Math.max(wp1,wp2)>0){
    L.push(`<div class="line ${hi(Math.max(wp1,wp2))}">💨 <b>${Math.round(w1)} km/h</b> · <b>${wp1}%</b>/1h `+
      `<span class="sep">·</span> <b>${Math.round(w2)} km/h</b> · <b>${wp2}%</b>/2h</div>`);
  }
  const nre=nextRainEvent(hours);
  if(nre){
    L.push(`<div class="line rainevt">🌧️ &gt;${RAIN_EVENT_MM} l/mp: ${roDateLong(nre.dk).split(' ').slice(0,2).join(' ')} `+
      `<b>${nre.total.toFixed(1).replace('.',',')} l</b> · ora ${nre.from}–${nre.to}</div>`);
  }
  const warm=(dMon(dk0)>=4&&dMon(dk0)<=9);
  const h0now=hNow();
  const todayRemaining=dayHours(hours,dk0).filter(h=>h.h>=h0now);
  // Verificare dublă: orele rămase din zi + ora curentă explicit (pt robustețe la TZ edge-cases)
  const cross=tempCross(todayRemaining,warm) ||
    (warm&&cur&&cur.tMean!=null&&cur.tMean>=HEAT_T ? {ivs:[fH(h0now)+'–24:00'],extreme:Math.round(cur.tMean)} : null) ||
    (!warm&&cur&&cur.tMean!=null&&cur.tMean<=FROST_T ? {ivs:[fH(h0now)+'–24:00'],extreme:Math.round(cur.tMean)} : null);
  if(cross){
    const cls=warm?'heat':'frost';
    const ic=warm?'🔥':'❄';
    L.push(`<div class="line ${cls}">${ic} ${cross.ivs.join(', ')} · <b>${cross.extreme}°</b></div>`);
  }
  if(!L.length){
    L.push(`<div class="line" style="color:#8aa0b8;font-weight:500">Fără șanse notabile de precipitații sau vânt în următoarele 2 ore.</div>`);
  }
  el('lines').innerHTML=L.join('');

  // ── Banda zilelor: 5 zile (nu 7) — mai mult loc per zi, cifre mai mari ──
  const days=next7days().slice(0,5);
  el('strip').innerHTML=days.map(dk=>{
    const s=dayStats(hours,dk);
    const dh=dayHours(hours,dk);
    const midDay=dh.find(h=>h.h===14)||dh[Math.floor(dh.length/2)]||null;
    const ic=midDay?condIcon(midDay).i:'—';
    const nm=['Du','Lu','Ma','Mi','Jo','Vi','Sâ'][dow(dk)];
    const rainTxt=s&&s.totP!=null?'Ploaie '+(Math.round(s.totP*10)/10).toFixed(1).replace('.',',')+' mm':'Ploaie —';
    const windTxt=s&&s.wmax!=null?'Vânt '+Math.round(s.wmax)+' km/h':'Vânt —';
    const arrow=s?windArrow(s.predDir):'·';
    const card=s?windCard(s.predDir):'';
    const dewTxt=s&&s.dpAvg!=null?'Punct rouă '+s.dpAvg+'°C':'Punct rouă —';
    return `<div class="d"><div class="dname">${nm}</div><div class="dico">${ic}</div>`+
      `<div class="dmax">${s&&s.tmax!=null?s.tmax+'°':'—'}</div>`+
      `<div class="dmin">${s&&s.tmin!=null?s.tmin+'°':'—'}</div>`+
      `<div class="ddet">`+
        `<div class="drain">${rainTxt}</div>`+
        `<div class="dwind">${windTxt} ${arrow} ${card}</div>`+
        `<div class="ddew">${dewTxt}</div>`+
      `</div></div>`;
  }).join('');
}

  if(!tz)return null;
  const map={
    'Europe/Bucharest':'romania','Europe/London':'united-kingdom',
    'Europe/Paris':'france','Europe/Berlin':'germany','Europe/Rome':'italy',
    'Europe/Madrid':'spain','Europe/Vienna':'austria','Europe/Amsterdam':'netherlands',
    'Europe/Brussels':'belgium','Europe/Warsaw':'poland','Europe/Budapest':'hungary',
    'Europe/Prague':'czechia','Europe/Sofia':'bulgaria','Europe/Athens':'greece',
    'Europe/Lisbon':'portugal','Europe/Zurich':'switzerland','Europe/Dublin':'ireland',
    'Europe/Copenhagen':'denmark','Europe/Stockholm':'sweden','Europe/Oslo':'norway',
    'Europe/Helsinki':'finland','Europe/Zagreb':'croatia','Europe/Belgrade':'serbia',
    'Europe/Ljubljana':'slovenia','Europe/Bratislava':'slovakia',

function owLevelClass(lvl){
  const n=parseInt(lvl,10);

}

function isEuropeanTZ(tz){ return !!tz && tz.startsWith('Europe/'); }

function parseMeteoalarmAtom(xmlText){
  const out=[];
  try{
    const doc=new DOMParser().parseFromString(xmlText,'text/xml');
    const entries=doc.querySelectorAll('entry');
    const now=Date.now();
    // Helper robust la namespace: caută text într-un element după numele LOCAL (ignoră prefixul cap:)
    const localText=(parent,localName)=>{
      // 1) încearcă direct
      let n=parent.querySelector(localName);
      if(n&&n.textContent.trim())return n.textContent.trim();
      // 2) iterează toate elementele și compară numele local (fără prefix namespace)
      const all=parent.getElementsByTagName('*');
      for(let i=0;i<all.length;i++){
        const ln=all[i].localName||all[i].tagName.replace(/^.*:/,'');
        if(ln===localName&&all[i].textContent.trim())return all[i].textContent.trim();
      }
      return '';
    };
    entries.forEach(en=>{
      const get=(sel)=>{const n=en.querySelector(sel);return n?n.textContent.trim():'';};
      const expRaw=localText(en,'expires');
      const effRaw=localText(en,'effective');
      const onsetRaw=localText(en,'onset')||effRaw;
      const exp=expRaw?Date.parse(expRaw):null;
      if(exp&&exp<now)return;  // expirată → ignorăm

      // parametri awareness_level / awareness_type
      let lvl='',typ='';
      const params=en.getElementsByTagName('*');
      for(let i=0;i<params.length;i++){
        const ln=params[i].localName||params[i].tagName.replace(/^.*:/,'');
        if(ln==='parameter'){
          let k='',v='';
          const kids=params[i].getElementsByTagName('*');
          for(let j=0;j<kids.length;j++){
            const kln=kids[j].localName||kids[j].tagName.replace(/^.*:/,'');
            if(kln==='valueName')k=kids[j].textContent.trim();
            if(kln==='value')v=kids[j].textContent.trim();
          }
          if(/awareness_level/i.test(k))lvl=(v.match(/(\d+)/)||[])[1]||'';
          if(/awareness_type/i.test(k))typ=(v.match(/(\d+)/)||[])[1]||'';
        }
      }
      const event=localText(en,'event')||'Avertizare meteo';
      const headline=localText(en,'headline')||get('title')||event;
      // Textul complet: combină description + instruction; fallback pe summary/content/title
      const description=localText(en,'description');
      const instruction=localText(en,'instruction');
      const summary=get('summary')||localText(en,'summary');
      const content=get('content')||localText(en,'content');
      let desc=[description,instruction].filter(Boolean).join('\n\n');
      if(!desc)desc=summary||content||'';
      // dacă summary e mai bogat decât description (uneori ANM pune tot în summary), îl preferăm
      if(summary&&summary.length>desc.length)desc=summary;
      const area=localText(en,'areaDesc');

      // poligoane
      const polys=[];
      for(let i=0;i<params.length;i++){
        const ln=params[i].localName||params[i].tagName.replace(/^.*:/,'');
        if(ln==='polygon'){
          const pts=params[i].textContent.trim().split(/\s+/).map(pair=>{
            const [la,lo]=pair.split(',').map(Number);
            return (isFinite(la)&&isFinite(lo))?[la,lo]:null;
          }).filter(Boolean);
          if(pts.length>=3)polys.push(pts);
        }
      }
      // geocodes
      const geocodes=[];
      for(let i=0;i<params.length;i++){
        const ln=params[i].localName||params[i].tagName.replace(/^.*:/,'');
        if(ln==='geocode'){
          const kids=params[i].getElementsByTagName('*');
          for(let j=0;j<kids.length;j++){
            const kln=kids[j].localName||kids[j].tagName.replace(/^.*:/,'');
            if(kln==='value'&&kids[j].textContent.trim())geocodes.push(kids[j].textContent.trim());
          }
        }
      }

      out.push({
        id:localText(en,'id')||get('id')||headline+effRaw,
        level:lvl, type:typ,
        event, headline, desc, area,
        effective:effRaw, expires:expRaw,
        expMs:exp, onsetMs:onsetRaw?Date.parse(onsetRaw):null,
        polys, geocodes,
      });
    });
  }catch(e){/* XML invalid → listă goală */}
  const seen=new Set(),uniq=[];
  out.forEach(w=>{if(!seen.has(w.id)){seen.add(w.id);uniq.push(w);}});
  uniq.sort((a,b)=>(parseInt(b.level||0)-parseInt(a.level||0)));
  return uniq;
}

function pointInPoly(lat,lon,poly){
  let inside=false;
  for(let i=0,j=poly.length-1;i<poly.length;j=i++){
    const yi=poly[i][0],xi=poly[i][1],yj=poly[j][0],xj=poly[j][1];
    const intersect=((yi>lat)!==(yj>lat))&&(lon<(xj-xi)*(lat-yi)/(yj-yi)+xi);
    if(intersect)inside=!inside;
  }
  return inside;
}

function regionGeocodesFor(){
  if(_locKind==='york') return ['UK513','UK514','UK515','UK516','UK517','UK518']; // Yorkshire & Humber
  if(_locKind==='daneti'||_locKind==='craiova'||_locKind==='raieti') return ['RO008']; // jud. Dolj
  return [];  // căutări libere: nu avem cod regional → ne bazăm pe poligon/proximitate
}

function regionKeywordsFor(){
  if(_locKind==='york') return ['york','yorkshire','humber','north east','pennines'];
  if(_locKind==='daneti'||_locKind==='craiova'||_locKind==='raieti') return ['dolj','oltenia','craiova'];
  return [];  // căutări libere: nu ghicim cuvinte-cheie
}

// Bounding-box generos pentru județul Dolj (Daneti/Craiova/Raieti sunt toate aici)
function inDoljBox(lat,lon){ return lat>=43.6&&lat<=44.6&&lon>=22.8&&lon<=24.5; }

function warningMatchesLocation(w){
  // Verifică TOATE metodele disponibile și acceptă dacă ORICARE confirmă (nu se oprește la prima).
  let hasGeoInfo=false;   // a avut vreo informație geografică pe care am putut-o evalua?

  // 1) Poligon: dacă punctul tău e în interior ⇒ sigur te privește
  if(w.polys&&w.polys.length){
    hasGeoInfo=true;
    for(const poly of w.polys){
      if(pointInPoly(LAT,LON,poly))return true;
    }
  }
  // 2) Geocode EMMA_ID: dacă vreun cod al regiunii tale se potrivește ⇒ te privește
  const myCodes=regionGeocodesFor();
  if(w.geocodes&&w.geocodes.length&&myCodes.length){
    hasGeoInfo=true;
    if(w.geocodes.some(g=>myCodes.some(mc=>g.toUpperCase().includes(mc.toUpperCase()))))return true;
  }
  // 3) Nume zonă (areaDesc): dacă conține un cuvânt-cheie al regiunii tale ⇒ te privește
  const kws=regionKeywordsFor();
  if(kws.length&&w.area){
    hasGeoInfo=true;
    const a=w.area.toLowerCase();
    if(kws.some(k=>a.includes(k)))return true;
  }
  // 4) Proximitate: dacă ești în Dolj și avertizarea menționează Oltenia/Dolj/sud-vest ⇒ te privește
  if((_locKind==='daneti'||_locKind==='craiova'||_locKind==='raieti'||inDoljBox(LAT,LON))&&w.area){
    const a=w.area.toLowerCase();
    if(/dolj|oltenia|craiova|sud-?vest|sud-?est|toată țara|toata tara|întreaga țară|intreaga tara|național|national/.test(a))return true;
  }

  // 5) Degradare sigură: dacă avertizarea NU avea nicio informație geografică evaluabilă
  //    (nici poligon, nici geocode, nici areaDesc utilă), n-o putem localiza — o marcăm
  //    „la nivel de țară" ca să o putem afișa cu notă, în loc s-o pierdem complet.
  if(!hasGeoInfo){
    w._countryWide=true;
    return false;   // nu o afișăm ca locală, dar e numărată în _owCountryWide
  }
  // avea info geografică dar nu s-a potrivit ⇒ chiar nu te privește
  return false;
}

async function fetchOfficialWarnings(){
  const country=countryFromTZ(TZ);
  const box=el('offwarn');if(!box)return;

  // ── OPȚIUNEA 2: locație în afara acoperirii Meteoalarm (non-Europa: Tokyo, Lima, Seattle...) ──
  if(!country){
    _owCache=[];
    _owCountryWide=0;
    _owStatus='non-europe';   // Meteoalarm acoperă doar Europa
    renderOfficialWarnings();
    return;
  }

  // Feed CAP Atom oficial Meteoalarm, per țară. Browserul nu-l poate lua direct (fără CORS),
  // deci trecem printr-un proxy CORS public. Degradare grațioasă dacă pică.
  const feed=`https://feeds.meteoalarm.org/feeds/meteoalarm-legacy-atom-${country}`;
  const proxies=[
    u=>`https://corsproxy.io/?url=${encodeURIComponent(u)}`,
    u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  ];

  for(const wrap of proxies){
    try{
      const ctrl=new AbortController(),tid=setTimeout(()=>ctrl.abort(),12000);
      const r=await fetch(wrap(feed),{signal:ctrl.signal});
      clearTimeout(tid);
      if(!r.ok)continue;
      const txt=await r.text();
      const parsed=parseMeteoalarmAtom(txt);
      // resetez marcajele de „country-wide" înainte de filtrare
      parsed.forEach(w=>{w._countryWide=false;});
      const local=parsed.filter(warningMatchesLocation);   // doar cele care acoperă locația curentă
      _owCache=local;
      // numără câte avertizări active există în țară dar nu pot fi localizate (căutări libere)
      _owCountryWide=parsed.filter(w=>w._countryWide).length;
      _owFetchedFor=country;
      _owStatus = local.length ? 'ok' : (_owCountryWide>0 ? 'country-only' : 'no-warnings');
      renderOfficialWarnings();
      return;
    }catch(e){ /* încearcă următorul proxy */ }
  }
  // toate proxy-urile au eșuat — nu blocăm aplicația, doar nu afișăm avertizări oficiale
  if(_owFetchedFor!==country){ _owCache=[]; _owStatus=''; renderOfficialWarnings(); }
}

function fmtDtShort(iso){
  if(!iso)return '';
  const d=new Date(iso);if(isNaN(d))return '';
  return d.toLocaleString('ro-RO',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit',timeZone:TZ});
}

function renderOfficialWarnings(){
  const box=el('offwarn');if(!box)return;

  // Fără avertizări locale → notă mică DOAR pt cazuri speciale, altfel ascuns
  if(!_owCache.length){
    if(_owStatus==='non-europe'){
      box.style.display='flex';
      box.innerHTML=`<div class="ow-note">🌍 Avertizări oficiale: doar pentru Europa (Meteoalarm/EUMETNET)</div>`;
      return;
    }
    if(_owStatus==='country-only' && _owCountryWide>0){
      box.style.display='flex';
      box.innerHTML=`<div class="ow-note">ℹ️ ${_owCountryWide} avertizare/i activă/e în țară (nelocalizabile precis aici)</div>`;
      return;
    }
    box.style.display='none'; box.innerHTML=''; return;
  }

  // ── Avertizări: DOAR iconițe compacte; click pe iconiță → expandează textul ANM complet ──
  box.style.display='flex';
  const chips=_owCache.map((w,idx)=>{
    const L=owLevelClass(w.level);
    const typeNm=OW_TYPES[parseInt(w.type,10)]||'';
    const eticheta=typeNm||L.nm||'Avertizare';
    return `<button class="ow-chip ${L.cls}" onclick="owToggle(${idx})" title="Apasă pentru textul integral">`+
      `<span class="ow-chip-ico">${L.ic}</span><span class="ow-chip-lbl">${esc(eticheta)}</span>`+
      `<span class="ow-chip-caret" id="ow-caret-${idx}">▸</span></button>`;
  }).join('');

  const panels=_owCache.map((w,idx)=>{
    const L=owLevelClass(w.level);
    const typeNm=OW_TYPES[parseInt(w.type,10)]||'';
    const titlu=typeNm?`${L.nm} — ${typeNm}`:(w.event||w.headline);
    const perioada=[w.effective?'de la '+fmtDtShort(w.effective):'',w.expires?'până la '+fmtDtShort(w.expires):''].filter(Boolean).join(' ');
    return `<div class="ow-panel ${L.cls}" id="ow-full-${idx}">`+
      `<div class="ow-panel-head">${L.ic} <b>${esc(titlu)}</b></div>`+
      (w.area?`<div class="ow-meta">📍 ${esc(w.area)}</div>`:'')+
      (perioada?`<div class="ow-meta">🕒 ${perioada}</div>`:'')+
      (w.desc?`<div class="ow-panel-body">${esc(w.desc)}</div>`:'<div class="ow-panel-body">(fără text detaliat în avertizare)</div>')+
    `</div>`;
  }).join('');

  box.innerHTML=`<div class="ow-chips">${chips}</div>${panels}`;
}

function owToggle(idx){
  const f=el('ow-full-'+idx);if(!f)return;
  f.classList.toggle('open');
  const caret=el('ow-caret-'+idx);
  if(caret)caret.textContent=f.classList.contains('open')?'▾':'▸';
}

function esc(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

// ── Stare locație și surse ───────────────────────────────────────────────
let _locKind='daneti';   // 'daneti'|'craiova'|'york'|'raieti'
let _srcMode ='best';    // 'best'|'toate'|'none'

const LOCS={
  daneti :{obj:HOME,    id:'btn-daneti'},
  craiova:{obj:CRAIOVA, id:'btn-craiova'},
  york   :{obj:YORK,    id:'btn-york'},
  raieti :{obj:RAIETI,  id:'btn-raieti'},
};

// Salvează starea curentă a widget-ului în localStorage (sincronizează cu MeteoDaneti)
function saveWidgetState(){
  try{
    // scrie pe LS_KEY (locație+praguri) — identic cu ce scrie MeteoDaneti
    localStorage.setItem(LS_KEY,JSON.stringify({
      loc:{lat:LAT,lon:LON,tz:TZ,name:LOC_NAME,elev:ELEV_OVERRIDE,kind:_locKind},
      thr:{RAIN_MIN,WIND_MIN,FROST_T,HEAT_T,P_LOW,P_HIGH}
    }));
    // scrie pe SYNC_KEY — include și surse+refresh pentru sincronizare completă
    localStorage.setItem(SYNC_KEY,JSON.stringify({
      loc:{lat:LAT,lon:LON,tz:TZ,name:LOC_NAME,elev:ELEV_OVERRIDE,kind:_locKind},
      thr:{RAIN_MIN,WIND_MIN,FROST_T,HEAT_T,P_LOW,P_HIGH},
      src:{bestMode:_srcMode==='best', selected:resolvedIds(LAT,LON)},
      refresh:Math.round(REFRESH_MS/60000),
      ts:Date.now()
    }));
  }catch(e){}
}

// Restaurează intervalul de refresh din localStorage
function restoreRefreshInterval(){
  let m=15;
  try{const v=parseInt(localStorage.getItem(REFRESH_KEY),10);if(v>=15&&v<=180)m=v;}catch(e){}
  REFRESH_MS=m*60*1000;
  const sel=el('w-refresh-sel');if(sel)sel.value=String(m);
}

// Schimbă intervalul de refresh și repornește timerul
function setWidgetRefreshInterval(minutes){
  const m=Math.max(15,Math.min(180,parseInt(minutes,10)||15));
  REFRESH_MS=m*60*1000;
  try{localStorage.setItem(REFRESH_KEY,String(m));}catch(e){}
  if(_refreshTimer)clearInterval(_refreshTimer);
  _refreshTimer=setInterval(loadWidget,REFRESH_MS);
  const sel=el('w-refresh-sel');if(sel)sel.value=String(m);
  saveWidgetState();   // notifică MeteoDaneti despre noul interval
  loadWidget();        // actualizează imediat datele în widget
}

function setLoc(kind){
  if(kind===_locKind)return;
  _locKind=kind;
  const L=LOCS[kind];
  LAT=L.obj.lat; LON=L.obj.lon; TZ=L.obj.tz; LOC_NAME=L.obj.name;
  ELEV_OVERRIDE=L.obj.elev||null; _resolvedElev=null;
  document.querySelectorAll('.loc-btn').forEach(b=>b.classList.remove('active'));
  el(L.id).classList.add('active');
  if(countryFromTZ(TZ)!==_owFetchedFor){_owCache=[];_owStatus='';_owCountryWide=0;renderOfficialWarnings();}
  saveWidgetState();
  loadWidget();
}

function setSrc(mode){
  if(mode===_srcMode)return;
  _srcMode=mode;
  document.querySelectorAll('.src-btn').forEach(b=>b.classList.remove('active'));
  el('btn-'+mode).classList.add('active');
  saveWidgetState();   // sincronizează cu MeteoDaneti instant
  loadWidget();
}

// Suprascrie bestIdsFor cu logica de mod surse
const _origBestIdsFor=bestIdsFor;
function resolvedIds(lat,lon){
  if(_srcMode==='none') return [];
  if(_srcMode==='toate') return [...OM_MODELS.map(m=>m.id),...ENS_MODELS.map(m=>m.id)];
  return _origBestIdsFor(lat,lon);
}

// Flash verde pe card la fiecare refresh reușit
function flashCard(){
  const c=el('card');
  if(!c)return;
  c.classList.remove('flashing');
  // force reflow ca animatia sa reporneasca de la 0
  void c.offsetWidth;
  c.classList.add('flashing');
  setTimeout(()=>c.classList.remove('flashing'),1500);
}

// ── Fundal dinamic sezonier (gradiente bogate, randomizate, cu lizibilitate garantată) ──
// Paletă pe anotimp × moment al zilei. Overlay-ul întunecat de deasupra (în CSS body::before)
// asigură că textul alb rămâne mereu lizibil indiferent de gradient.
function seasonOf(mon){
  if(mon>=3&&mon<=5)return 'spring';
  if(mon>=6&&mon<=8)return 'summer';
  if(mon>=9&&mon<=11)return 'autumn';
  return 'winter';
}
function dayPartOf(h){
  if(h>=5&&h<8)return 'dawn';
  if(h>=8&&h<18)return 'day';
  if(h>=18&&h<21)return 'dusk';
  return 'night';
}
// Palete: fiecare e o listă de gradiente armonioase, întunecate îndeajuns cât textul alb să iasă bine
const BG_PALETTES={
  spring:{
    dawn:['linear-gradient(165deg,#14202d,#233930)','linear-gradient(160deg,#1c2837,#2d4639)'],
    day :['linear-gradient(165deg,#111c2d,#183c2d)','linear-gradient(150deg,#142333,#1e4431)'],
    dusk:['linear-gradient(165deg,#201c31,#392d3f)','linear-gradient(160deg,#181c2b,#302538)'],
    night:['linear-gradient(165deg,#070f18,#0e1c15)','linear-gradient(160deg,#09121d,#111f17)'],
  },
  summer:{
    dawn:['linear-gradient(165deg,#172030,#302d1f)','linear-gradient(160deg,#1c2738,#39331f)'],
    day :['linear-gradient(165deg,#0e1f31,#142d3c)','linear-gradient(150deg,#112539,#183544)'],
    dusk:['linear-gradient(165deg,#231c2b,#3f2b20)','linear-gradient(160deg,#1f1c30,#39281c)'],
    night:['linear-gradient(165deg,#070f18,#0f1722)','linear-gradient(160deg,#09111a,#0c1523)'],
  },
  autumn:{
    dawn:['linear-gradient(165deg,#201c27,#342820)','linear-gradient(160deg,#1c1725,#392b1d)'],
    day :['linear-gradient(165deg,#171c2b,#2d251c)','linear-gradient(150deg,#1a2031,#372b1d)'],
    dusk:['linear-gradient(165deg,#231a25,#3f2b20)','linear-gradient(160deg,#1f1722,#3c2a1c)'],
    night:['linear-gradient(165deg,#090c12,#15110f)','linear-gradient(160deg,#0a0e18,#181214)'],
  },
  winter:{
    dawn:['linear-gradient(165deg,#141c2a,#202d3c)','linear-gradient(160deg,#172031,#273543)'],
    day :['linear-gradient(165deg,#111d2e,#1c3143)','linear-gradient(150deg,#142335,#20384a)'],
    dusk:['linear-gradient(165deg,#171c2b,#282b3c)','linear-gradient(160deg,#141828,#232838)'],
    night:['linear-gradient(165deg,#060a12,#0c121c)','linear-gradient(160deg,#070c12,#0e151f)'],
  },
};
function applyDynamicBg(){
  try{
    const dk0=dkNow(),h=hNow();
    const s=seasonOf(dMon(dk0)), dp=dayPartOf(h);
    const opts=(BG_PALETTES[s]&&BG_PALETTES[s][dp])||['linear-gradient(165deg,#050a12,#091826)'];
    const g=opts[Math.floor(Math.random()*opts.length)];
    document.body.style.background=g;
    document.body.style.backgroundAttachment='fixed';
  }catch(e){}
}


// ── Ceas live în widget ──────────────────────────────────────────────────
// Culori ceas — se rotesc la fiecare actualizare ca să confirme vizual refresh-ul
const CLOCK_COLORS=['#7dd3fc','#6ee7b7','#fbbf24','#f9a8d4','#a5b4fc','#fb923c','#34d399','#38bdf8','#e879f9','#facc15'];
let _clockColorIdx=0;
function cycleClockColor(){
  _clockColorIdx=(_clockColorIdx+1)%CLOCK_COLORS.length;
  const c=el('w-clock');if(c)c.style.color=CLOCK_COLORS[_clockColorIdx];
}

function tickWidgetClock(){
  const c=el('w-clock');if(!c)return;
  try{c.textContent=new Date().toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit',timeZone:TZ});}
  catch(e){c.textContent=new Date().toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'});}
}
tickWidgetClock();setInterval(tickWidgetClock,1000);

// ── Căutare liberă de locație în widget (Open-Meteo geocoding) ───────────
async function searchWidgetLoc(){
  const q=(el('w-loc-q').value||'').trim();
  if(q.length<2)return;
  const res=el('w-loc-res');res.style.display='none';res.innerHTML='';
  try{
    const p=new URLSearchParams({name:q,count:5,language:'ro',format:'json'});
    const r=await fetch('https://geocoding-api.open-meteo.com/v1/search?'+p);
    if(!r.ok)return;
    const d=await r.json();
    if(!d.results||!d.results.length){
      res.innerHTML='<div style="font-size:.7rem;color:#9fb3c8;padding:4px 8px">Nicio locație găsită</div>';
      res.style.display='flex';res.style.flexDirection='column';return;
    }
    res.innerHTML=d.results.map((g,i)=>{
      const nm=[g.name,g.admin1,g.country].filter(Boolean).join(', ');
      return `<button onclick="pickWidgetLoc(${i})" data-idx="${i}"
        style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:6px;
               color:#cfe0f2;padding:4px 8px;font-size:.7rem;font-weight:600;cursor:pointer;text-align:left">
        📍 ${nm}</button>`;
    }).join('');
    res.style.display='flex';res.style.flexDirection='column';
    // stocam rezultatele pt a le putea accesa la click
    el('w-loc-res')._results=d.results;
  }catch(e){}
}

function pickWidgetLoc(idx){
  const g=el('w-loc-res')._results&&el('w-loc-res')._results[idx];
  if(!g)return;
  LAT=g.latitude;LON=g.longitude;
  TZ=g.timezone||TZ;
  LOC_NAME=[g.name,g.admin1,g.country].filter(Boolean).join(', ');
  ELEV_OVERRIDE=null;_locKind='search';
  // dezactivează butoanele fixe
  document.querySelectorAll('.loc-btn').forEach(b=>b.classList.remove('active'));
  el('w-loc-res').style.display='none';
  el('w-loc-q').value='';
  if(countryFromTZ(TZ)!==_owFetchedFor){_owCache=[];_owStatus='';_owCountryWide=0;renderOfficialWarnings();}
  saveWidgetState();
  loadWidget();
}

// ── Schimbă intervalul de refresh + actualizează imediat + notifică MeteoDaneti ──
restoreRefreshInterval();
refreshMainAppLink();
applyDynamicBg();
loadWidget();
_refreshTimer=setInterval(loadWidget,REFRESH_MS);

// ── Sincronizare bidirecțională: ascultă schimbările din MeteoDaneti ────
// Storage event se declanșează DOAR în alte tab-uri/ferestre — exact ce vrem.
window.addEventListener('storage',e=>{
  // Preia schimbările de locație/praguri scrise de MeteoDaneti pe LS_KEY
  if(e.key===LS_KEY&&e.newValue){
    try{
      const o=JSON.parse(e.newValue);
      if(!o)return;
      let changed=false;
      if(o.loc&&typeof o.loc.lat==='number'){
        const loc=LOCS[o.loc.kind];
        if(loc){
          // locație fixă recunoscută din MeteoDaneti — preia doar dacă widgetul NU are o căutare liberă activă
          if(_locKind!=='search'){
            if(o.loc.kind!==_locKind){
              _locKind=o.loc.kind;
              document.querySelectorAll('.loc-btn').forEach(b=>b.classList.remove('active'));
              const btn=el(loc.id);if(btn)btn.classList.add('active');
              LAT=o.loc.lat;LON=o.loc.lon;TZ=o.loc.tz||TZ;
              LOC_NAME=o.loc.name||LOC_NAME;ELEV_OVERRIDE=o.loc.elev!=null?o.loc.elev:null;
              el('w-loc').innerHTML='📍 <b>'+LOC_NAME.split(',')[0].trim()+'</b>';
              changed=true;
            }
          }
          // dacă widgetul e pe căutare liberă (Paris etc.) → ignoră complet locația din MeteoDaneti
        } else {
          // MeteoDaneti e pe căutare liberă → preia doar dacă și widgetul e pe search
          // (evitată suprascrierea Paris cu altă căutare declanșată din MeteoDaneti)
          if(_locKind==='search'){
            _locKind='search';
            document.querySelectorAll('.loc-btn').forEach(b=>b.classList.remove('active'));
            LAT=o.loc.lat;LON=o.loc.lon;TZ=o.loc.tz||TZ;
            LOC_NAME=o.loc.name||LOC_NAME;ELEV_OVERRIDE=o.loc.elev!=null?o.loc.elev:null;
            el('w-loc').innerHTML='📍 <b>'+LOC_NAME.split(',')[0].trim()+'</b>';
            changed=true;
          }
        }
      }
      if(o.thr){
        const T=o.thr;
        if(typeof T.RAIN_MIN==='number')RAIN_MIN=T.RAIN_MIN;
        if(typeof T.WIND_MIN==='number')WIND_MIN=T.WIND_MIN;
        if(typeof T.FROST_T==='number')FROST_T=T.FROST_T;
        if(typeof T.HEAT_T==='number')HEAT_T=T.HEAT_T;
        if(typeof T.P_LOW==='number')P_LOW=T.P_LOW;
        if(typeof T.P_HIGH==='number')P_HIGH=T.P_HIGH;
        changed=true;
      }
      if(changed)loadWidget();
    }catch(er){}
  }
  // Preia intervalul de refresh schimbat din MeteoDaneti
  if(e.key===REFRESH_KEY&&e.newValue){
    const m=parseInt(e.newValue,10);
    if(m>=15&&m<=180&&m*60*1000!==REFRESH_MS){
      REFRESH_MS=m*60*1000;
      if(_refreshTimer)clearInterval(_refreshTimer);
      _refreshTimer=setInterval(loadWidget,REFRESH_MS);
      const sel=el('w-refresh-sel');if(sel)sel.value=String(m);
    }
  }
  // Preia surse schimbate din MeteoDaneti (via SYNC_KEY)
  if(e.key===SYNC_KEY&&e.newValue){
    try{
      const o=JSON.parse(e.newValue);
      if(!o||Math.abs(Date.now()-(o.ts||0))>30000)return;
      if(o.src){
        const newMode=o.src.bestMode?'best':(Array.isArray(o.src.selected)&&o.src.selected.length===0?'none':'toate');
        if(newMode!==_srcMode){
          _srcMode=newMode;
          document.querySelectorAll('.src-btn').forEach(b=>b.classList.remove('active'));
          const btn=el('btn-'+_srcMode);if(btn)btn.classList.add('active');
          loadWidget();
        }
      }
    }catch(er){}
  }
});

// Cerere automată de permisiune pentru notificări
if('Notification'in window&&Notification.permission==='default'){
  try{ Notification.requestPermission(); }catch(e){}
}

// Înregistrare service worker
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw-widget.js').catch(()=>{});
  });
}
</script>
